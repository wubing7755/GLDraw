name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.0.3"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            artifact: GLDraw-windows-x64
          - os: ubuntu-latest
            platform: linux-x64
            artifact: GLDraw-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          elif [[ "$GITHUB_REF_NAME" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=""
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Cache GLFW source
        uses: actions/cache@v4
        with:
          path: build/Release/_deps
          key: ${{ runner.os }}-release-glfw-3.3.9-${{ hashFiles('CMakeLists.txt') }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgl1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          if ($version) {
            ./release.bat -Version $version -Platform ${{ matrix.platform }}
          } else {
            ./release.bat -Platform ${{ matrix.platform }}
          }

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ -n "${{ steps.version.outputs.value }}" ]; then
            bash ./release.sh --version "${{ steps.version.outputs.value }}" --platform "${{ matrix.platform }}"
          else
            bash ./release.sh --platform "${{ matrix.platform }}"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/GLDraw-v*
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="v${{ inputs.version }}"
          else
            tag="$GITHUB_REF_NAME"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --notes ""
          gh release upload "$tag" dist/GLDraw-v* --clobber
