name: CI

on:
  push:
    branches: [main, master, 'fix/**']
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache GLFW source
      uses: actions/cache@v4
      with:
        path: build/**/_deps
        key: ${{ runner.os }}-glfw-3.3.9-${{ hashFiles('CMakeLists.txt') }}

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libgl1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install cmake

    - name: Configure CMake
      shell: bash
      run: |
        preset="$(echo "${{ matrix.build_type }}" | tr '[:upper:]' '[:lower:]')"
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          preset="mingw-$preset"
        fi
        echo "GLDRAW_CMAKE_PRESET=$preset" >> "$GITHUB_ENV"
        cmake --preset "$preset"

    - name: Build
      shell: bash
      run: cmake --build --preset "$GLDRAW_CMAKE_PRESET" --parallel

    - name: Test
      shell: bash
      run: ctest --preset "$GLDRAW_CMAKE_PRESET" --output-on-failure

  sanitize:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache GLFW source
      uses: actions/cache@v4
      with:
        path: build/**/_deps
        key: ${{ runner.os }}-glfw-3.3.9-${{ hashFiles('CMakeLists.txt') }}

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libgl1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install cmake

    - name: Configure with ASan
      shell: bash
      run: cmake --preset asan

    - name: Build with ASan
      shell: bash
      run: cmake --build --preset asan --parallel

    - name: Test with ASan
      shell: bash
      run: ctest --preset asan --output-on-failure
