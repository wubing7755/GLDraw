name: CI

on:
  push:
    branches: [main, master, 'fix/**']
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libgl1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install cmake

    - name: Configure CMake
      shell: bash
      run: |
        BUILD_DIR="build/${{ matrix.os }}-${{ matrix.build_type }}"
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          cmake -B "$BUILD_DIR" -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        else
          cmake -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        fi

    - name: Build
      shell: bash
      run: |
        BUILD_DIR="build/${{ matrix.os }}-${{ matrix.build_type }}"
        cmake --build "$BUILD_DIR" --config ${{ matrix.build_type }}

    - name: Test
      shell: bash
      run: |
        BUILD_DIR="build/${{ matrix.os }}-${{ matrix.build_type }}"
        cd "$BUILD_DIR" && ctest --output-on-failure

  sanitize:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libgl1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev valgrind

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install cmake

    - name: Configure with ASan
      shell: bash
      run: |
        BUILD_DIR="build/${{ matrix.os }}-asan"
        cmake -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Debug -DGLDRAW_ENABLE_ASAN=ON

    - name: Build with ASan
      shell: bash
      run: |
        BUILD_DIR="build/${{ matrix.os }}-asan"
        cmake --build "$BUILD_DIR" --config Debug

    - name: Test with ASan
      shell: bash
      run: |
        BUILD_DIR="build/${{ matrix.os }}-asan"
        cd "$BUILD_DIR" && ctest --output-on-failure

    - name: Valgrind smoke suite
      if: runner.os == 'Linux'
      shell: bash
      run: |
        BUILD_DIR="build/${{ matrix.os }}-asan"
        cd "$BUILD_DIR"
        valgrind --leak-check=full --error-exitcode=1 ./bin/gldraw_document_core_tests
        valgrind --leak-check=full --error-exitcode=1 ./bin/gldraw_command_tests
