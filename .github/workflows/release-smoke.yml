name: Release Smoke

on:
  pull_request:
    branches: [main, master]
    paths:
      - '.github/workflows/release.yml'
      - '.github/workflows/legacy-release.yml'
      - 'packaging/**'
      - 'tools/package_*.ps1'
      - 'tools/package_*.sh'
      - 'release.bat'
      - 'release.sh'
      - 'CMakeLists.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
          - os: ubuntu-latest
            platform: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache GLFW source
        uses: actions/cache@v4
        with:
          path: build/Release/_deps
          key: ${{ runner.os }}-release-smoke-glfw-3.3.9-${{ hashFiles('CMakeLists.txt') }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake curl libgl1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Package Windows portable
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\release.bat -Version 0.0.0 -Platform "${{ matrix.platform }}"

      - name: Package Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          pwsh -NoProfile -ExecutionPolicy Bypass -File tools/package_windows_installer.ps1 -Version 0.0.0 -Platform "${{ matrix.platform }}"

      - name: Validate Windows assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = "dist/GLDraw-v0.0.0-${{ matrix.platform }}.zip"
          $setup = "dist/GLDraw-v0.0.0-${{ matrix.platform }}-setup.exe"
          if (-not (Test-Path $zip)) { throw "Missing $zip" }
          if (-not (Test-Path $setup)) { throw "Missing $setup" }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $entries = [IO.Compression.ZipFile]::OpenRead($zip).Entries.FullName
          foreach ($required in @(
            "GLDraw-v0.0.0-${{ matrix.platform }}/bin/GLDraw.exe",
            "GLDraw-v0.0.0-${{ matrix.platform }}/share/gldraw/shaders/basic.vert",
            "GLDraw-v0.0.0-${{ matrix.platform }}/share/gldraw/shaders/basic.frag",
            "GLDraw-v0.0.0-${{ matrix.platform }}/share/gldraw/themes/oceanic.json"
          )) {
            if ($entries -notcontains $required) { throw "Missing zip entry $required" }
          }

      - name: Package Linux portable
        if: runner.os == 'Linux'
        shell: bash
        run: bash ./release.sh --version 0.0.0 --platform "${{ matrix.platform }}"

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: bash ./tools/package_appimage.sh --version 0.0.0 --platform "${{ matrix.platform }}"

      - name: Validate Linux assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tarball="dist/GLDraw-v0.0.0-${{ matrix.platform }}.tar.gz"
          appimage="dist/GLDraw-v0.0.0-${{ matrix.platform }}.AppImage"
          test -f "$tarball"
          test -f "$appimage"
          tar -tzf "$tarball" | grep -F "GLDraw-v0.0.0-${{ matrix.platform }}/bin/GLDraw"
          tar -tzf "$tarball" | grep -F "GLDraw-v0.0.0-${{ matrix.platform }}/share/gldraw/shaders/basic.vert"
          tar -tzf "$tarball" | grep -F "GLDraw-v0.0.0-${{ matrix.platform }}/share/gldraw/themes/oceanic.json"

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-${{ matrix.platform }}
          path: |
            dist/GLDraw-v0.0.0-*.zip
            dist/GLDraw-v0.0.0-*.tar.gz
            dist/GLDraw-v0.0.0-*.exe
            dist/GLDraw-v0.0.0-*.AppImage
          if-no-files-found: error
