name: Lint Workflows

on:
  push:
    branches: [main, master, 'fix/**', 'feature/**']
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Run actionlint
        run: ~/go/bin/actionlint
