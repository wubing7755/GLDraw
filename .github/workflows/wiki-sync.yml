name: Sync Wiki

on:
  push:
    branches: [docs/wiki]
    paths:
      - doc/wiki/**       # Wiki content changes
      - .github/workflows/wiki-sync.yml  # Workflow itself

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wiki repo
        run: |
          git clone https://github.com/${{ github.repository }}.wiki.git wiki
      - name: Copy wiki files
        run: cp -r doc/wiki/* wiki/
      - name: Push to wiki
        run: |
          cd wiki
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "Update from ${{ github.sha }}"
          git push
